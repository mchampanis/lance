# fly.toml app configuration file generated for lance-frosty-meadow-3401 on 2026-04-16T14:35:30+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lance-frosty-meadow-3401'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/lance.db'

[processes]
  bot = 'uv run --no-sync python bot.py'

[[mounts]]
  source = 'lance_data'
  destination = '/data'
  processes = ['bot']

[[restart]]
  policy = 'always'
  processes = ['bot']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  processes = ['bot']
