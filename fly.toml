app = 'lance'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[processes]
  bot = "uv run --no-sync python bot.py"

[env]
  DB_PATH = '/data/lance.db'

[mounts]
  source = "lance_data"
  destination = "/data"
  processes = ["bot"]

[[restart]]
  policy = "always"
  processes = ["bot"]

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  processes = ["bot"]
